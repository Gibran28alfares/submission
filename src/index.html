<!DOCTYPE html>
<html lang="id">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="StoryApp - Bagikan cerita dan laporan bencana sekitarmu" />
    <meta name="theme-color" content="#141414" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StoryApp" />
    <link rel="apple-touch-icon" href="/images/icon-192.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>StoryApp</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/scripts/index.js"></script>
  </head>
  <body class="bg-[#f5f5f5] font-sans antialiased">
    <header class="bg-white border-b border-[#e5e5e5] sticky top-0 z-[1000]">
      <div class="main-header container flex justify-between items-center min-h-[72px] px-6 max-w-[1240px] mx-auto">
        <div class="flex items-center gap-4">
          <button id="btn-notification" class="p-2 text-[#4a4a4a] hover:text-black transition-colors" title="Aktifkan Notifikasi" aria-label="Toggle Notification">
            <i data-lucide="bell-off" class="w-5 h-5"></i>
          </button>
          <a class="brand-name text-2xl font-bold tracking-tight text-[#141414]" href="#/">StoryApp</a>
        </div>

        <nav id="navigation-drawer" class="navigation-drawer fixed top-0 left-0 w-[280px] h-full bg-white shadow-2xl translate-x-[-100%] transition-transform duration-300 lg:static lg:w-auto lg:h-auto lg:bg-transparent lg:shadow-none lg:translate-x-0 z-[9999] p-8 lg:p-0">
          <ul id="nav-list" class="nav-list flex flex-col lg:flex-row gap-6">
            <li><a href="#/" class="text-sm font-medium text-[#4a4a4a] hover:text-black transition-colors">Beranda</a></li>
            <li><a href="#/add" class="text-sm font-medium text-[#4a4a4a] hover:text-black transition-colors">Tambah Cerita</a></li>
            <li><a href="#/favorites" class="text-sm font-medium text-[#4a4a4a] hover:text-black transition-colors">Favorit</a></li>
            <li><a href="#/about" class="text-sm font-medium text-[#4a4a4a] hover:text-black transition-colors">Tentang Kami</a></li>
            
            <li id="install-item" class="hidden">
              <button id="btn-install" class="px-4 py-2 bg-black text-white text-xs font-bold rounded-xl hover:bg-slate-800 transition-all flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> PASANG APLIKASI
              </button>
            </li>

            <li id="logout-item" class="hidden">
              <button id="btn-logout" class="text-sm font-medium text-red-500 hover:text-red-700 transition-colors flex items-center gap-2 px-4 py-2 lg:p-0 border border-red-100 lg:border-none rounded-xl lg:rounded-none bg-red-50/50 lg:bg-transparent" aria-label="Logout">
                <i data-lucide="log-out" class="w-4 h-4"></i> Keluar
              </button>
            </li>
          </ul>
        </nav>

        <button id="drawer-button" class="drawer-button lg:hidden p-2 text-[#141414] focus:outline-none" aria-label="Menu Navigasi">
          <i data-lucide="menu" class="w-7 h-7"></i>
        </button>
      </div>
    </header>

    <main id="main-content" class="main-content py-8"></main>
    
    <div id="toast-container" class="fixed bottom-8 right-8 z-[10001]"></div>
  </body>
</html>
